<!DOCTYPE html>
<html>
<head>
    <title>Ejemplos con Fetch</title>
    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background: #cfefff; 
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding: 20px;
    }

    .box {
        background: #ffffff;
        width: 320px;
        padding: 25px;
        margin: 15px;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        transition: transform 0.2s ease;
    }

    .box:hover {
        transform: translateY(-5px);
    }

    h3 {
        margin-bottom: 15px;
        color: #2c3e50;
        text-align: center;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-bottom: 12px;
        border-radius: 8px;
        border: 1px solid #bbb;
        outline: none;
        transition: border 0.2s;
    }

    input:focus, select:focus {
        border: 1px solid #0077b6;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #0077b6; 
        color: white;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.3s ease, transform 0.1s;
    }

    button:hover {
        background: #005f8a;
    }

    button:active {
        transform: scale(0.97);
    }

    p {
        margin-top: 10px;
        font-weight: bold;
        color: #333;
        text-align: center;
    }

    h1 {
    color: #042f46;
    margin-bottom: 5px;

    
    .sub {
    color: #555;
    margin-bottom: 20px;
    }
}

</style>
</head>

<body>
    <h1>AquaSkin</h1>
    <p class="sub">Tu tienda de cuidado facial</p>

    <div class="box">
        <h3>Ingrese el ID de un productto para conocer su precio (Colsultar los ID: 10, 20 o 30)</h3>
        <input type="text" id="idI"> <button onclick="get()">Buscar</button>
        <p id="r1"></p>
    </div>

    <div class="box">
        <h3>Ingrese un valor para calcular su descuento</h3>
        <input type="number" id="mI" placeholder="Monto">
        <select id="tI"><option value="general">General</option><option value="estudiante">Estudiante</option></select>
        <button onclick="post()">Calcular</button>
        <p id="r2"></p>
    </div>

    
    <script>
        async function get() {
            //Obtener el ID desde el input
            const id = document.getElementById('idI').value;
            //Peticion GET al backend con el ID en la URL
            const res = await fetch(`Consulta.php?id=${id}`);
            //Convertir la respuesta a JSON
            const d = await res.json();
            //Mostrar resulados
            document.getElementById('r1').innerText = d.data ? `${d.data.nombre}: $${d.data.precio}` : d.msj;
        }

        async function post() {

            //Obtener valores del formulario
            const monto = document.getElementById('mI').value;
            const tipo = document.getElementById('tI').value;
            //Peticiono POST con JSON al backend
            const res = await fetch('Calculo.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json' //Indicamos que enviamos JSON
                },
                body: JSON.stringify({monto, tipo}) //Se convierte el objeto a JSON
            });
            //Convertir respuesta a JSON
            const d = await res.json();

            //Manejo de error
            if (!res.ok) {
                document.getElementById('r2').innerText = d.error;
                document.getElementById('r2').style.color = "red";
                return;
            }

            //Respuesta correcta
            document.getElementById('r2').style.color = "green";
            document.getElementById('r2').innerText = 
                `Aplicado ${d.descuento}. Total: $${d.total}`;
        }
    </script>
</body>
</html>
